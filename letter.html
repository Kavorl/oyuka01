<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Захиа</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:black;
font-family:Georgia,serif;
}

/* background */

.bg{
position:absolute;
width:100%;
height:100%;
background:url("background.png") center/cover no-repeat;
}

/* scene */

.scene{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* envelope */

.envelope{
width:420px;
height:260px;
position:relative;
}

/* base */

.base{
width:100%;
height:100%;
background:white;
border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

box-shadow:0 20px 40px rgba(0,0,0,.6);
}

/* flap */

.flap{
position:absolute;

width:0;
height:0;

border-left:210px solid transparent;
border-right:210px solid transparent;
border-top:150px solid white;

top:0;

transform-origin:top;
transition:1.5s;
}

/* star seal */

.seal{

position:absolute;

width:70px;
height:70px;

background:#b30000;

clip-path:polygon(
50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,
50% 70%,21% 91%,32% 57%,2% 35%,39% 35%
);

top:90px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:20px;

cursor:pointer;

box-shadow:0 0 15px #ff6b6b;

}

/* letter */

.letter{

position:absolute;
width:420px;

background:#eaf6ff;

padding:30px;

border-radius:8px;

box-shadow:0 20px 40px rgba(0,0,0,.6);

transform-origin:top;
transform:scaleY(0);

opacity:0;

}

/* show letter */

.showLetter{

animation:letterRise 2s forwards;

}

@keyframes letterRise{

0%{
transform:translateY(0) scaleY(0);
opacity:0;
}

100%{
transform:translateY(-250px) scaleY(1);
opacity:1;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="scene">

<div class="envelope" id="env">

<div class="flap"></div>

<div class="base">🐰</div>

<div class="seal" onclick="openEnvelope()">★</div>

<div class="letter" id="letter">

<span id="text"></span>

</div>

</div>
</div>

<!-- music continue -->

<iframe
src="https://www.youtube.com/embed/xCcQ4BxYq1U?autoplay=1&loop=1&playlist=xCcQ4BxYq1U&controls=0&modestbranding=1&playsinline=1"
allow="autoplay"
style="position:fixed;width:1px;height:1px;opacity:0;border:0;">
</iframe>

<script>

/* open envelope */

function openEnvelope(){

document.querySelector(".flap").style.transform="rotateX(-180deg)";

let letter=document.getElementById("letter");

setTimeout(()=>{

letter.classList.add("showLetter");

typing();

},800);

}


/* typing */

const message=`Юуны өмнө чамд 3 сарын 8-ны баярын мэнд хүргэе.

Сүүлд би чамд муухай аашилж,
чамайг гомдоосон.
Тэр бүхний төлөө үнэхээр уучлаарай.
Чамайг гомдоох гэж бодоогүй юм шүү
Учир нь чи миний хувьд
маш үнэ цэнэтэй хүн.
Чиний инээмсэглэл
чиний зан ааш
чиний надад өгдөг тэр дулаан мэдрэмж
энэ бүхэн миний хувьд маш чухал.
Заримдаа хүн
өөрийн хамгийн дотны ойр хүндээ л
тэнэг зан гаргачихдаг юм шиг байна.
Гэхдээ үнэндээ
би чамайг гомдоохыг огт хүсээгүй.
Чи миний амьдралд орж ирсэнд баярладаг аа.
Чамд дахин нэг удаа
3 сарын 8-ны баярын мэнд хүргэе 🌸`;

let i=0;

function typing(){

let target=document.getElementById("text");

function type(){

if(i<message.length){

target.innerHTML+=message.charAt(i);

i++;

setTimeout(type,40);

}

}

type();

}

</script>

</body>
</html>
