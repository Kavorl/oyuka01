
<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 1 - Оюунтүлхүүрт</title>

<style>

body{
margin:0;
height:100vh;
font-family:sans-serif;
overflow:hidden;
background:#000;
position:relative;
}

/* background */

.background-image{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("background.png") center/cover no-repeat;
z-index:0;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
0%{opacity:0}
100%{opacity:1}
}

/* stars */

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.9;
box-shadow:0 0 8px white,0 0 16px white;
animation:twinkle 1.5s infinite;
z-index:1;
}

@keyframes twinkle{
0%{opacity:0.2;transform:scale(0.7)}
50%{opacity:1;transform:scale(1.4)}
100%{opacity:0.2;transform:scale(0.7)}
}

/* sakura */

.sakura{
position:absolute;
font-size:18px;
pointer-events:none;
z-index:2;
}

/* button */

.next-button{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:18px 40px;
font-size:20px;
color:white;
background:rgba(255,120,170,0.85);
border:none;
border-radius:14px;
cursor:pointer;
z-index:3;
box-shadow:0 0 10px rgba(255,120,170,0.8),
0 0 25px rgba(255,120,170,0.6),
0 0 40px rgba(255,120,170,0.4);
animation:pulse 2s infinite;
transition:0.3s;
}

@keyframes pulse{
0%{box-shadow:0 0 8px rgba(255,120,170,0.6),0 0 20px rgba(255,120,170,0.4);}
50%{box-shadow:0 0 18px rgba(255,120,170,1),0 0 40px rgba(255,120,170,0.8);}
100%{box-shadow:0 0 8px rgba(255,120,170,0.6),0 0 20px rgba(255,120,170,0.4);}
}

/* sparkle */

.sparkle{
position:absolute;
color:white;
font-size:14px;
pointer-events:none;
animation:spark 1s forwards;
}

@keyframes spark{
0%{opacity:1;transform:scale(1)}
100%{opacity:0;transform:translateY(-40px) scale(0.3)}
}

/* zoom transition */

.zoom-out{
animation:zoom 1s forwards;
}

@keyframes zoom{
0%{transform:scale(1)}
100%{transform:scale(1.6);opacity:0}
}

</style>
</head>

<body>

<div class="background-image"></div>

<button class="next-button"
onmouseenter="hoverSakura(event)"
onclick="goLetter(event)">
→ энийг дар
</button>

<script>

/* stars */

for(let i=0;i<120;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
document.body.appendChild(star)
}

/* sakura physics (wind drift) */

function createSakura(){

let el=document.createElement("div")
el.className="sakura"
el.innerHTML="🌸"

let x=Math.random()*window.innerWidth
let y=-20

let speedY=1+Math.random()*1.5
let wind=(Math.random()-0.5)*1.5
let rotation=Math.random()*360
let rotationSpeed=(Math.random()-0.5)*2

el.style.left=x+"px"
el.style.top=y+"px"

document.body.appendChild(el)

function animate(){

y+=speedY
x+=wind

rotation+=rotationSpeed

/* салхины хүч бага зэрэг өөрчлөгдөнө */
wind+= (Math.random()-0.5)*0.05

el.style.transform=`translate(${x}px,${y}px) rotate(${rotation}deg)`

if(y<window.innerHeight+40){
requestAnimationFrame(animate)
}else{
el.remove()
}

}

animate()

}

/* sakura spawn */

setInterval(createSakura,300)

/* hover sakura */

function hoverSakura(e){

for(let i=0;i<6;i++){

let el=document.createElement("div")

el.className="sakura"
el.innerHTML="🌸"

el.style.left=(e.clientX + (Math.random()*60-30))+"px"
el.style.top=(e.clientY + (Math.random()*60-30))+"px"

document.body.appendChild(el)

setTimeout(()=>el.remove(),3000)

}

}

/* sparkle burst */

function sparkle(x,y){

for(let i=0;i<20;i++){

let sp=document.createElement("div")

sp.className="sparkle"
sp.innerHTML="✨"

sp.style.left=x+"px"
sp.style.top=y+"px"

sp.style.transform="translate("+(Math.random()*120-60)+"px,"+(Math.random()*120-60)+"px)"

document.body.appendChild(sp)

setTimeout(()=>sp.remove(),1000)

}

}

/* page change */

function goLetter(e){

sparkle(e.clientX,e.clientY)

document.body.classList.add("zoom-out")

setTimeout(()=>{
window.location.href="letter.html"
},900)

}

</script>

</body>
</html>
