<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эхлэл</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* background */

.bg{
position:absolute;
width:100%;
height:100%;
background:url("background.jpg") center/cover no-repeat;
animation:fade 2s forwards;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

/* sakura */

.sakura{
position:absolute;
font-size:18px;
pointer-events:none;
}

/* button */

.startBtn{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

padding:16px 40px;

font-size:20px;

border:none;
border-radius:40px;

background:linear-gradient(45deg,#ff9ac6,#ffc3e2);

color:white;

cursor:pointer;

box-shadow:0 0 20px #ff8dc2;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{box-shadow:0 0 10px #ff8dc2}
50%{box-shadow:0 0 30px #ff8dc2}
100%{box-shadow:0 0 10px #ff8dc2}

}

</style>
</head>

<body>

<div class="bg"></div>

<button class="startBtn" onclick="startSite()">Намайг дар 💌</button>

<!-- hidden music -->

<iframe
id="music"
src=""
allow="autoplay"
style="position:fixed;width:1px;height:1px;opacity:0;border:0;">
</iframe>


<script>

/* stars */

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

}


/* sakura physics */

function createSakura(){

let el=document.createElement("div");

el.className="sakura";
el.innerHTML="🌸";

let x=Math.random()*window.innerWidth;
let y=-20;

let vy=1+Math.random()*1.3;
let vx=(Math.random()-.5)*1.2;

let rot=Math.random()*360;

document.body.appendChild(el);

function animate(){

y+=vy;
x+=vx;
rot+=2;

el.style.left=x+"px";
el.style.top=y+"px";
el.style.transform="rotate("+rot+"deg)";

if(y<window.innerHeight){

requestAnimationFrame(animate);

}else{

el.remove();

}

}

animate();

}

setInterval(createSakura,300);


/* button click */

function startSite(){

/* start music */

document.getElementById("music").src=
"https://www.youtube.com/embed/xCcQ4BxYq1U?autoplay=1&loop=1&playlist=xCcQ4BxYq1U&controls=0&modestbranding=1&playsinline=1";

/* transition */

document.body.style.transition="1s";
document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="page2.html";
},1000);

}

</script>

</body>
</html>
