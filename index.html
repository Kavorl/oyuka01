<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Oyuuntulhuur</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;
background:#000;
position:relative;
}

/* background */

.bg{
position:absolute;
width:100%;
height:100%;
background:url("background.png") center/cover no-repeat;
z-index:0;
}

/* stars */

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:0 0 8px white,0 0 20px white;
animation:twinkle 1.6s infinite;
}

@keyframes twinkle{
0%{opacity:.2;transform:scale(.6)}
50%{opacity:1;transform:scale(1.5)}
100%{opacity:.2;transform:scale(.6)}
}

/* sakura */

.sakura{
position:absolute;
font-size:18px;
pointer-events:none;
z-index:2;
}

/* button */

.open-btn{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

padding:20px 48px;

font-size:22px;

border:none;

border-radius:16px;

cursor:pointer;

color:white;

background:linear-gradient(45deg,#ff6fa5,#ff9ec2);

box-shadow:
0 0 12px #ff6fa5,
0 0 25px #ff6fa5,
0 0 45px #ff6fa5;

animation:pulse 2s infinite;

z-index:3;

}

@keyframes pulse{

0%{box-shadow:0 0 10px #ff6fa5}
50%{box-shadow:0 0 35px #ff6fa5}
100%{box-shadow:0 0 10px #ff6fa5}

}

/* sparkle */

.sparkle{
position:absolute;
font-size:14px;
pointer-events:none;
animation:spark 1s forwards;
}

@keyframes spark{
0%{opacity:1;transform:scale(1)}
100%{opacity:0;transform:translateY(-40px) scale(.2)}
}

/* zoom */

.zoom{
animation:zoom 1s forwards;
}

@keyframes zoom{
0%{transform:scale(1)}
100%{transform:scale(1.7);opacity:0}
}

</style>
</head>

<body>

<div class="bg"></div>

<button class="open-btn" onclick="goLetter(event)">
💌 Захиаг нээх
</button>

<script>

/* stars */

for(let i=0;i<120;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
document.body.appendChild(s)
}

/* sakura physics */

function createSakura(){

let el=document.createElement("div")
el.className="sakura"
el.innerHTML="🌸"

let x=Math.random()*window.innerWidth
let y=-20

let vy=1+Math.random()*1.5
let vx=(Math.random()-0.5)*1.5

let rot=Math.random()*360
let rotSpeed=(Math.random()-0.5)*2

document.body.appendChild(el)

function animate(){

y+=vy
x+=vx

rot+=rotSpeed

vx+=(Math.random()-.5)*.05

el.style.transform=`translate(${x}px,${y}px) rotate(${rot}deg)`

if(y<window.innerHeight+40){

requestAnimationFrame(animate)

}else{

el.remove()

}

}

animate()

}

setInterval(createSakura,300)

/* sparkle */

function sparkle(x,y){

for(let i=0;i<20;i++){

let sp=document.createElement("div")
sp.className="sparkle"
sp.innerHTML="✨"

sp.style.left=x+"px"
sp.style.top=y+"px"

sp.style.transform=`translate(${Math.random()*120-60}px,${Math.random()*120-60}px)`

document.body.appendChild(sp)

setTimeout(()=>sp.remove(),1000)

}

}

function goLetter(e){

sparkle(e.clientX,e.clientY)

document.body.classList.add("zoom")

setTimeout(()=>{
window.location.href="letter.html"
},900)

}

</script>

</body>
</html>
